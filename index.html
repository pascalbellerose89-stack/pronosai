function Btn({ children, onClick, variant="gold", disabled, full, size="md" }) {
  const variants = {
    gold: { background:"linear-gradient(135deg,#D97706,#FBBF24)", color:"#000" },
    blue: { background:"linear-gradient(135deg,#1D4ED8,#60A5FA)", color:"#fff" },
    green: { background:"linear-gradient(135deg,#059669,#34D399)", color:"#000" },
    ghost: { background:"transparent", color:"#94a3b8", border:"1px solid #1e293b" },
    danger: { background:"transparent", color:"#f87171", border:"1px solid #7f1d1d" },
  };
  const sizes = { sm:"8px 14px", md:"12px 20px", lg:"15px 28px" };
  const fs = { sm:12, md:14, lg:15 };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding:sizes[size], border:"none", borderRadius:12,
      fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:fs[size],
      cursor:disabled?"not-allowed":"pointer", opacity:disabled?.5:1,
      transition:"all .2s", width:full?"100%":"auto",
      ...variants[variant],
    }}>{children}</button>
  );
}

function Input({ label, type="text", value, onChange, placeholder, hint }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ display:"block", fontSize:10, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:"#475569", marginBottom:6, fontFamily:"'Syne',sans-serif" }}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", background:"#080c15", border:"1.5px solid #1e293b", borderRadius:12, padding:"12px 14px", color:"#e2e8f0", fontSize:14, outline:"none" }} />
      {hint && <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>{hint}</div>}
    </div>
  );
}

function TeamSearch({ label, value, onChange, teams }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState(value);
  const ref = useRef();
  const filtered = q.length > 0 ? teams.filter(t => t.toLowerCase().includes(q.toLowerCase())).slice(0,6) : teams.slice(0,6);

  useEffect(() => { setQ(value); }, [value]);

  return (
    <div style={{ position:"relative" }} ref={ref}>
      {label && <label style={{ display:"block", fontSize:10, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:"#475569", marginBottom:6, fontFamily:"'Syne',sans-serif" }}>{label}</label>}
      <input
        value={q}
        onChange={e => { setQ(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(()=>setOpen(false),150)}
        placeholder="Tapez ou sélectionnez..."
        style={{ width:"100%", background:"#080c15", border:"1.5px solid #1e293b", borderRadius:12, padding:"12px 14px", color:"#e2e8f0", fontSize:14, outline:"none" }}
      />
      {open && filtered.length > 0 && (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, right:0, background:"#0f172a", border:"1px solid #1e293b", borderRadius:12, zIndex:50, overflow:"hidden", boxShadow:"0 8px 32px rgba(0,0,0,.6)" }}>
          {filtered.map(t => (
            <div key={t} onMouseDown={() => { onChange(t); setQ(t); setOpen(false); }}
              style={{ padding:"10px 14px", fontSize:13, color:"#cbd5e1", cursor:"pointer", borderBottom:"1px solid #0f172a20" }}
              onMouseEnter={e=>e.target.style.background="#1e293b"}
              onMouseLeave={e=>e.target.style.background="transparent"}>
              ⚽ {t}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Tooltip({ text }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position:"relative", display:"inline-block" }}>
      <button onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(!show)}
        style={{ background:"#1e293b", border:"1px solid #334155", color:"#94a3b8", borderRadius:"50%", width:16, height:16, fontSize:9, fontWeight:700, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", marginLeft:4, flexShrink:0 }}>
        i
      </button>
      {show && (
        <div style={{ position:"absolute", bottom:"calc(100% + 6px)", left:"50%", transform:"translateX(-50%)", background:"#0f172a", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", width:220, fontSize:12, color:"#cbd5e1", zIndex:100, lineHeight:1.5, boxShadow:"0 8px 24px rgba(0,0,0,.6)" }}>
          {text}
          <div style={{ position:"absolute", top:"100%", left:"50%", transform:"translateX(-50%)", border:"6px solid transparent", borderTopColor:"#334155" }}/>
        </div>
      )}
    </span>
  );
}

function ProbBar({ label, value, color, tooltip }) {
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
        <span style={{ fontSize:13, color:"#94a3b8", display:"flex", alignItems:"center" }}>{label}{tooltip&&<Tooltip text={tooltip}/>}</span>
        <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:16, color }}>{value}%</span>
      </div>
      <div style={{ height:7, background:"#1e293b", borderRadius:4, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${value}%`, background:color, borderRadius:4, transition:"width 1.2s cubic-bezier(.22,1,.36,1)" }}/>
      </div>
    </div>
  );
}

function Stars({ n, max=5, color="#FBBF24" }) {
  return <span>{Array.from({length:max}).map((_,i)=><span key={i} style={{ color:i<n?color:"#1e293b", fontSize:13 }}>★</span>)}</span>;
}

function RiskBadge({ risque }) {
  const m = { faible:["#22c55e","#052e16"], moyen:["#f59e0b","#1c1000"], "élevé":["#ef4444","#1a0000"] };
  const [c,bg] = m[risque?.toLowerCase()]||["#94a3b8","#1e293b"];
  return <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, background:bg, color:c, border:`1px solid ${c}44`, letterSpacing:.5, textTransform:"uppercase" }}>{risque}</span>;
}

  if (tier === "free") return `${base}
Compétition: ${competition||"Non précisée"} | Match: ${team1} vs ${team2}
Réponds UNIQUEMENT en JSON pur sans markdown:

function AnalysePage({ user, onOpenVestiaire, onGoAuth }) {
  const tier = user?.tier || "free";
  const planData = PLANS.find(p=>p.id===tier);
  const tc = planData.color;

  const [competition, setCompetition] = useState("");
  const [customCompetition, setCustomCompetition] = useState("");
  const [team1, setTeam1] = useState("");
  const [team2, setTeam2] = useState("");
  const [comboMatches, setComboMatches] = useState([{t1:"",t2:""}]);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [analysesLeft, setAnalysesLeft] = useState(3);
  const resultRef = useRef();

  const effectiveCompetition = competition === "__autre__" ? customCompetition : competition;
  const teams = competition && LEAGUES[competition] ? LEAGUES[competition] : Object.values(LEAGUES).flat().filter(t=>!t.startsWith("──"));
  const canAnalyze = team1.trim().length>1 && team2.trim().length>1 && (tier!=="free"||analysesLeft>0);

  const analyze = async () => {
    setLoading(true); setResult(null); setError(null);
    try {
      const prompt = buildPrompt(tier, { team1, team2, competition: effectiveCompetition, comboMatches });
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, tools:[{type:"web_search_20250305",name:"web_search"}], messages:[{role:"user",content:prompt}] }),
      });
      const data = await res.json();
      const text = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
      const clean = text.replace(/```json|```/g,"").trim();
      const start = clean.indexOf("{"), end = clean.lastIndexOf("}");
      if(start===-1) throw new Error("JSON introuvable");
      const parsed = JSON.parse(clean.slice(start,end+1));
      setResult(parsed);
      if(tier==="free") setAnalysesLeft(a=>Math.max(0,a-1));
      setTimeout(()=>resultRef.current?.scrollIntoView({behavior:"smooth"}),100);
    } catch(e) {
      setError("Erreur lors de l'analyse. Vérifiez votre connexion et réessayez.");
    } finally { setLoading(false); }
  };

          { titre:"Sécurité", contenu:"Vos données sont chiffrées (SSL/TLS), stockées sur des serveurs sécurisés en Europe. Votre mot de passe est haché (bcrypt) et inaccessible même à notre équipe." },
          { titre:"Cookies", contenu:"PronosAI utilise uniquement des cookies techniques nécessaires au fonctionnement du service (session, authentification). Aucun cookie publicitaire ou de tracking tiers." },
        ].map((s,i)=>(
          <div key={i} style={{ marginBottom:16, background:"#0f172a", border:"1px solid #1e293b", borderRadius:14, padding:"14px 16px" }}>
            <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#34d399", marginBottom:8 }}>{s.titre}</div>
            <p style={{ fontSize:13, color:"#94a3b8", lineHeight:1.7, margin:0 }}>{s.contenu}</p>
          </div>
        ))}
        <div style={{ fontSize:11, color:"#334155", textAlign:"center", marginTop:8 }}>Conformément au RGPD (UE) 2016/679 · Mise à jour : Juin 2026</div>
      </div>
    </div>
  );
}


function BottomNav({ page, onNav, user }) {
  const items = user ? [
    { id:"home", icon:"🏠", label:"Accueil" },
    { id:"analyse", icon:"⚽", label:"Analyser" },
    { id:"pricing", icon:"🏆", label:"Plans" },
    { id:"lexique", icon:"📖", label:"Lexique" },
    { id:"vestiaire", icon:"👕", label:"Vestiaire" },
  ] : [
    { id:"home", icon:"🏠", label:"Accueil" },
    { id:"pricing", icon:"🏆", label:"Plans" },
    { id:"lexique", icon:"📖", label:"Lexique" },
    { id:"auth", icon:"🔑", label:"Connexion" },
  ];

  const isActive = (id) => page === id || (page==="vestiaire"&&id==="vestiaire") || (page==="auth"&&id==="auth") || (page==="analyse"&&id==="analyse");

  return (
    <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"#06090f", borderTop:"1px solid #1e293b", display:"flex", zIndex:100, padding:"8px 0 14px", backdropFilter:"blur(12px)" }}>
      {items.map(item=>(
        <button key={item.id} onClick={()=>onNav(item.id)}
          style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"none", border:"none", cursor:"pointer", padding:"4px 0", position:"relative" }}>
          {item.id==="analyse" && user && (
            <div style={{ position:"absolute", top:0, right:"calc(50% - 16px)", width:6, height:6, borderRadius:"50%", background:"#34D399" }}/>
          )}
          <span style={{ fontSize:18 }}>{item.icon}</span>
          <span style={{ fontSize:9, fontWeight:600, color:isActive(item.id)?"#FBBF24":"#334155", fontFamily:"'Syne',sans-serif", letterSpacing:.5, textTransform:"uppercase", transition:"color .2s" }}>{item.label}</span>
          {isActive(item.id) && <div style={{ position:"absolute", bottom:-14, width:20, height:2, background:"#FBBF24", borderRadius:2 }}/>}
        </button>
      ))}
    </div>
  );
}


export default function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [pendingPlan, setPendingPlan] = useState(null);

  const handlePlanSelect = (planId) => {
    setPendingPlan(planId);
    setPage("auth");
  };

  const handleAuth = (userData) => {
    setUser(userData);
    setPage("analyse");
  };
  const handleLogout = () => { setUser(null); setPage("home"); };
  const handleChangePlan = (planId) => { setUser(u=>({...u,tier:planId})); };
  const handleGoAuth = (planId) => { setPendingPlan(planId); setPage("auth"); };

  const navTo = (p) => {
    if (p === "analyse" && !user) { setPendingPlan("free"); setPage("auth"); return; }
    if (p === "auth" && user) { setPage("vestiaire"); return; }
    if (p === "vestiaire" && !user) { setPage("auth"); return; }
    setPage(p);
  };

  return (
    <>
      <style>{G}</style>
      <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#06090f", paddingBottom:72 }}>
        {page==="home" && <LandingPage onNav={navTo} onChoosePlan={()=>setPage("pricing")} onQuiSommesNous={()=>setPage("qui-sommes-nous")}/>}
        {page==="pricing" && <PricingPage onSelect={handlePlanSelect} onBack={()=>setPage("home")}/>}
        {page==="auth" && <AuthPage plan={pendingPlan||"free"} onSuccess={handleAuth} onBack={()=>setPage(user?"home":"pricing")} onCGU={()=>setPage("cgu")} onPrivacy={()=>setPage("privacy")}/>}
        {page==="analyse" && <AnalysePage user={user} onOpenVestiaire={()=>setPage("vestiaire")} onGoAuth={handleGoAuth}/>}
        {page==="vestiaire" && user && <VestiairePage user={user} onLogout={handleLogout} onChangePlan={handleChangePlan}/>}
        {page==="lexique" && <LexiquePage onBack={()=>setPage(user?"analyse":"home")}/>}
        {page==="qui-sommes-nous" && <QuiSommesNousPage onBack={()=>setPage("home")}/>}
        {page==="cgu" && <CGUPage onBack={()=>setPage("auth")}/>}
        {page==="privacy" && <PrivacyPage onBack={()=>setPage("auth")}/>}
        <BottomNav page={page} onNav={navTo} user={user}/>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
