function AuthScreen({ plan, onSuccess, onBack }) {
  const [mode, setMode] = useState('signup');
  const [selectedPlan, setSelectedPlan] = useState(plan || 'free');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [age18, setAge18] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const planData = PLANS.find((p) => p.id === selectedPlan);

  const submit = async () => {
    setError('');
    if (!email || !password)
      return setError('Tous les champs sont obligatoires.');
    if (mode === 'signup' && password !== confirm)
      return setError('Les mots de passe ne correspondent pas.');
    if (password.length < 8)
      return setError('Mot de passe : 8 caractères minimum.');
    if (mode === 'signup' && !age18)
      return setError("Tu dois attester avoir 18 ans ou plus pour t'inscrire.");
    setLoading(true);
    try {
      const data =
        mode === 'signup'
          ? await supabase.signUp(email, password)
          : await supabase.signIn(email, password);

      if (data.error || data.error_description || data.msg) {
        const msg =
          data.error_description ||
          data.msg ||
          data.error?.message ||
          'Erreur de connexion.';
        if (msg.includes('Invalid login'))
          setError('Email ou mot de passe incorrect.');
        else if (msg.includes('already registered'))
          setError('Cet email est déjà utilisé. Connecte-toi.');
        else if (msg.includes('Email not confirmed'))
          setError('Vérifie ta boîte mail pour confirmer ton compte.');
        else setError(msg);
        setLoading(false);
        return;
      }

      const userEmail = data.user?.email || data.email || email;
      const userId = data.user?.id || data.id || null;
      const userToken = data.access_token;

      // Mettre à jour le plan dans Supabase
      if (userId && userToken && mode === 'signup') {
        await new Promise((r) => setTimeout(r, 1000));
        await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${userToken}`,
            Prefer: 'return=minimal',
          },
          body: JSON.stringify({
            tier: 'free',
            last_plan_change: null,
          }),
        });
      }

      // Récupérer le vrai plan depuis Supabase
      let realTier = selectedPlan;
      let userLastChange = null;
      if (userId && userToken) {
        try {
          const profileRes = await fetch(
            `${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=tier,last_plan_change`,
            {
              headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${userToken}`,
              },
            }
          );
          const profileData = await profileRes.json();
          if (profileData?.[0]?.tier) realTier = profileData[0].tier;
          if (profileData?.[0]?.last_plan_change)
            userLastChange = profileData[0].last_plan_change;
        } catch (e) {}
      }

      // Si plan payant et mode signup → déclencher Stripe
      if (mode === 'signup' && selectedPlan !== 'free' && userId && userToken) {
        const priceId =
          selectedPlan === 'premium'
            ? STRIPE_PRICE_PREMIUM
            : STRIPE_PRICE_AVANCE;
        try {
          const stripeRes = await fetch(
            `${SUPABASE_URL}/functions/v1/rapid-responder`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
              },
              body: JSON.stringify({
                action: 'create_subscription',
                user_id: userId,
                email: userEmail,
                price_id: priceId,
                tier: selectedPlan,
              }),
            }
          );
          const stripeData = await stripeRes.json();
          if (stripeData.url) {
            onSuccess({
              email: userEmail,
              tier: 'free',
              token: userToken,
              id: userId,
              last_plan_change: userLastChange,
            });
            await Linking.openURL(stripeData.url);
            return;
          }
        } catch (e) {}
      }

      onSuccess({
        email: userEmail,
        tier: realTier,
        token: userToken,
        id: userId,
        last_plan_change: userLastChange,
      });
    } catch (e) {
      setError('Erreur réseau. Vérifie ta connexion.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <ScrollView
      style={{ flex: 1, padding: 16 }}
      contentContainerStyle={{ paddingBottom: 100 }}>
      <TouchableOpacity
        onPress={onBack}
        style={{
          width: 36,
          height: 36,
          backgroundColor: C.card,
          borderRadius: 10,
          borderWidth: 1,
          borderColor: C.border,
          alignItems: 'center',
          justifyContent: 'center',

  const [unsubPassword, setUnsubPassword] = useState('');
  const [unsubError, setUnsubError] = useState('');
  const [unsubLoading, setUnsubLoading] = useState(false);
  const handleSubscribe = async (tier) => {
    const priceId =
      tier === 'premium' ? STRIPE_PRICE_PREMIUM : STRIPE_PRICE_AVANCE;
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/rapid-responder`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({
          action: 'create_subscription',
          user_id: user.id,
          email: user.email,
          price_id: priceId,
          tier,
        }),
      });
      const data = await res.json();
      if (data.url) {
        await Linking.openURL(data.url);
      } else {
        Alert.alert(
          'Erreur',
          `Réponse: ${JSON.stringify(data).substring(0, 100)}`
        );
      }
    } catch (e) {
      Alert.alert('Erreur', 'Erreur réseau. Réessayez.');
    }
  };
  const handleResilier = async () => {
    if (!unsubPassword)
      return setUnsubError('Entre ton mot de passe pour confirmer.');
    setUnsubLoading(true);
    setUnsubError('');
    try {
      // Vérifier le mot de passe
      const verif = await fetch(
        `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY },
          body: JSON.stringify({ email: user.email, password: unsubPassword }),
        }
      );
      const verifData = await verif.json();
      if (verifData.error || !verifData.access_token) {
        setUnsubError('Mot de passe incorrect.');
        setUnsubLoading(false);
        return;
      }
      // Supprimer via Edge Function
      const res = await fetch(`${SUPABASE_URL}/functions/v1/rapid-responder`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({ action: 'delete_account', user_id: user.id }),
      });
      const data = await res.json();
      if (data.success) {
        onLogout();
      } else {
        setUnsubError('Erreur lors de la suppression. Réessayez.');
      }
    } catch (e) {
      setUnsubError('Erreur réseau. Réessayez.');

    {
      term: 'Value Bet',
      full: 'Pari de valeur',
      desc: "Paris dont la probabilité réelle d'arriver est supérieure à ce que reflète la cote du bookmaker. C'est là que se trouve le vrai avantage du parieur expert sur le long terme. PronosAI analyse les cotes pour identifier les value bets.",
    },
    {
      term: 'Victoire à domicile',
      full: 'Pari 1 (équipe à domicile)',
      desc: "Dans le pari 1N2, le '1' correspond à la victoire de l'équipe qui reçoit, celle qui joue sur son terrain. Généralement favorite car les équipes performent mieux chez elles.",
    },
    {
      term: "Victoire à l'extérieur",
      full: 'Pari 2 (équipe visiteuse)',
      desc: "Dans le pari 1N2, le '2' correspond à la victoire de l'équipe qui se déplace. Souvent associée à une cote plus élevée car les équipes performent généralement moins bien hors de leur stade.",
    },
    {
      term: 'xG',
      full: 'Expected Goals (Buts attendus)',
      desc: 'Statistique avancée qui mesure la qualité des occasions créées par une équipe, indépendamment des buts réellement marqués. Un xG élevé indique une équipe dangereuse. Utilisé par PronosAI pour affiner ses analyses.',
    },
  ].sort((a, b) => a.term.localeCompare(b.term, 'fr', { sensitivity: 'base' }));

  const filtered = search.trim()
    ? ALL_ITEMS.filter(
        (i) =>
          i.term.toLowerCase().includes(search.toLowerCase()) ||
          i.full.toLowerCase().includes(search.toLowerCase()) ||
          i.desc.toLowerCase().includes(search.toLowerCase())
      )
    : ALL_ITEMS;

  const letters = [
    ...new Set(
      filtered.map((i) => {
        const c = i.term
          .replace(/[+\-0-9]/g, '')
          .charAt(0)
          .toUpperCase();
        return c || '#';
      })
    ),
  ].sort();

  const grouped = letters.reduce((acc, l) => {
    acc[l] = filtered.filter((i) => {
      const c = i.term
        .replace(/[+\-0-9]/g, '')
        .charAt(0)
        .toUpperCase();
      return (c || '#') === l;
    });
    return acc;
  }, {});

  return (
    <View style={{ flex: 1 }}>
      {/* Header fixe */}
      <View
        style={{
          padding: 16,
          paddingBottom: 8,
          backgroundColor: C.bg,
          borderBottomWidth: 1,

        </Text>
        {/* Barre de recherche */}
        <View
          style={{
            backgroundColor: C.card,
            borderRadius: 12,
            borderWidth: 1.5,
            borderColor: C.border,
            flexDirection: 'row',
            alignItems: 'center',
            paddingHorizontal: 12,
            paddingVertical: 10,
          }}>
          <Text style={{ fontSize: 16, marginRight: 8 }}>🔍</Text>
          <TextInput
            value={search}
            onChangeText={setSearch}
            placeholder="Recherche..."
            placeholderTextColor="#334155"
            style={{ flex: 1, color: '#e2e8f0', fontSize: 14 }}
            clearButtonMode="while-editing"
          />
          {search.length > 0 && (
            <TouchableOpacity
              onPress={() => setSearch('')}
              style={{ padding: 4 }}>
              <Text style={{ color: C.muted, fontSize: 16 }}>✕</Text>
            </TouchableOpacity>
          )}
        </View>
      </View>

      <View style={{ flex: 1, flexDirection: 'row' }}>
        {/* Liste principale */}
        <ScrollView
          ref={scrollRef}
          style={{ flex: 1 }}
          contentContainerStyle={{ padding: 16, paddingBottom: 100 }}>
          {!search.trim() && (
            <View
              style={{
                backgroundColor: C.card,
                borderRadius: 12,
                borderWidth: 1,
                borderColor: C.border,
                padding: 12,
                marginBottom: 16,
              }}>
              <Text style={{ fontSize: 13, color: C.muted, lineHeight: 20 }}>
                💡 Nouveau dans les paris ? Ce lexique explique simplement tous
                les termes que tu rencontreras dans tes analyses PronosAI.
              </Text>
            </View>
          )}

          {filtered.length === 0 && (
            <View style={{ alignItems: 'center', padding: 40 }}>
              <Text style={{ fontSize: 32, marginBottom: 12 }}>🔍</Text>
              <Text
                style={{
                  fontSize: 15,
                  fontWeight: '700',
                  color: '#f1f5f9',
                  marginBottom: 6,
                }}>

              </Text>
              <Text
                style={{ fontSize: 13, color: C.muted, textAlign: 'center' }}>

            </View>

          {Object.entries(grouped).map(([letter, items]) => (
            <View key={letter}>
              {/* Séparateur lettre */}
              <View
                style={{
                  flexDirection: 'row',
                  alignItems: 'center',
                  marginBottom: 10,
                  marginTop: 6,
                }}>

                  style={{
                    width: 32,
                    height: 32,
                    borderRadius: 10,
                    backgroundColor: C.gold + '20',
                    borderWidth: 1,

                    style={{ fontSize: 14, fontWeight: '800', color: C.gold }}>

                  </Text>
                </View>
                <View
                  style={{ flex: 1, height: 1, backgroundColor: C.border }}

              </View>
              {items.map((item) => (
                <View

                  style={{
                    backgroundColor: C.card,
                    borderRadius: 14,

                    borderColor: C.border,

      ].map((s, i) => (
        <View
          key={i}
          style={{
            backgroundColor: C.card,
            borderRadius: 14,
            borderWidth: 1,
            borderColor: C.border,
            padding: 14,
            marginBottom: 10,
          }}>
          <Text
            style={{
              fontSize: 14,
              fontWeight: '700',
              color: '#34d399',
              marginBottom: 8,
            }}>
            {s.title}
          </Text>
          <Text style={{ fontSize: 13, color: '#94a3b8', lineHeight: 21 }}>
            {s.content}
          </Text>
        </View>
      ))}
    </ScrollView>
  );
}

// ─── BOTTOM NAV ──────────────────────────────────────────────────────────────

function BottomNav({ page, onNav, user }) {
  const items = user
    ? [
        { id: 'home', icon: '🏠', label: 'Accueil' },
        { id: 'analyse', icon: '⚽', label: 'Analyser' },
        { id: 'plans', icon: '🏆', label: 'Plans' },
        { id: 'lexique', icon: '📖', label: 'Lexique' },
        { id: 'vestiaire', icon: '👕', label: 'Vestiaire' },
      ]
    : [
        { id: 'home', icon: '🏠', label: 'Accueil' },
        { id: 'plans', icon: '🏆', label: 'Plans' },
        { id: 'lexique', icon: '📖', label: 'Lexique' },
        { id: 'auth', icon: '🔑', label: 'Connexion' },
      ];

  return (
    <View
      style={{
        position: 'absolute',
        bottom: 0,
        left: 0,
        right: 0,
        backgroundColor: C.bg,
        borderTopWidth: 1,
        borderTopColor: C.border,
      }}>
      {/* Onglets navigation */}
      <View style={{ flexDirection: 'row', paddingBottom: 20, paddingTop: 8 }}>
        {items.map((item) => (
          <TouchableOpacity
            key={item.id}
            onPress={() => onNav(item.id)}
            activeOpacity={0.7}
            style={{ flex: 1, alignItems: 'center', gap: 3 }}>
            <Text style={{ fontSize: 20 }}>{item.icon}</Text>
            <Text
              style={{
                fontSize: 9,
                fontWeight: '700',
                color: page === item.id ? C.gold : C.faint,
                letterSpacing: 0.5,
                textTransform: 'uppercase',
              }}>
              {item.label}
            </Text>
            {page === item.id && (
              <View
                style={{
                  width: 16,
                  height: 2,
                  backgroundColor: C.gold,
                  borderRadius: 2,
                }}
              />
            )}
          </TouchableOpacity>
        ))}
      </View>
    </View>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [pendingPlan, setPendingPlan] = useState('free');
  const [prevPage, setPrevPage] = useState('home');
  const [cdmMode, setCdmMode] = useState(false);
  const [showWelcome, setShowWelcome] = useState(false);
  const [showPaymentFailed, setShowPaymentFailed] = useState(false);

  useEffect(() => {
    // Pop-up de bienvenue : première visite uniquement
    try {
      if (!localStorage.getItem('pronosai_welcome_seen')) setShowWelcome(true);
    } catch (e) { setShowWelcome(true); }
    // Restaurer la session enregistrée (connexion en un clic)
    try {
      const saved = localStorage.getItem('pronosai_session');
      if (saved) {
        const u = JSON.parse(saved);
        if (u && u.id && u.token) {
          setUser(u);
          fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${u.id}&select=tier,last_plan_change`, {
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${u.token}` },
          })
            .then((r) => r.json())
            .then((d) => {
              if (Array.isArray(d) && d[0] && d[0].tier) {
                setUser((prev) => {
                  if (!prev) return prev;
                  const nu = { ...prev, tier: d[0].tier, last_plan_change: d[0].last_plan_change };
                  try { localStorage.setItem('pronosai_session', JSON.stringify(nu)); } catch (e) {}
                  return nu;
                });
              } else if (d && d.message) {
                try { localStorage.removeItem('pronosai_session'); } catch (e) {}
                setUser(null);
              }
            })
            .catch(() => {});
        }
      }
    } catch (e) {}
  }, []);

  useEffect(() => {
    const fetchConfig = async () => {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?key=eq.CDM_MODE&select=value`,
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`,
            },
          }
        );
        const data = await res.json();
        if (data?.[0]?.value === 'true') setCdmMode(true);
      } catch (e) {}
    };
    fetchConfig();
  }, []);

  const navTo = (p) => {
    if (p === 'analyse' && !user) {
      setPendingPlan('free');
      setPage('auth');
      return;
    }
    if (p === 'vestiaire' && !user) {
      setPage('auth');
      return;
    }
    setPage(p);
  };

  const handleGoAuth = (plan) => {
    setPendingPlan(plan);
    setPage('auth');
  };
  const handleAuth = async (userData) => {
    setUser(userData);
    try { localStorage.setItem('pronosai_session', JSON.stringify(userData)); } catch (e) {}
    setPage('analyse');

    // Afficher le popup seulement si l'utilisateur voulait un plan payant mais est en gratuit
    if (userData.tier !== 'free') return;
    if (pendingPlan && pendingPlan !== 'free') {
      setTimeout(() => setShowPaymentFailed(true), 1500);
    }
    // Rafraîchir le profil depuis Supabase pour avoir le bon plan
    try {
      const profileRes = await fetch(
        `${SUPABASE_URL}/rest/v1/profiles?id=eq.${userData.id}&select=tier,last_plan_change,stripe_subscription_id`,
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${userData.token}`,
          },
        }
      );
      const profileData = await profileRes.json();
      if (profileData?.[0]?.tier) {
        setUser((u) => {
          const nu = { ...u, tier: profileData[0].tier };
          try { localStorage.setItem('pronosai_session', JSON.stringify(nu)); } catch (e) {}
          return nu;
        });
      }
    } catch (e) {}
    // Vérifier les résultats en arrière-plan
    try {
      await fetch(`${SUPABASE_URL}/functions/v1/rapid-responder`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({ action: 'check_results' }),
      });
    } catch (e) {}
  };
  const handleLogout = () => {
    try { localStorage.removeItem('pronosai_session'); } catch (e) {}
    setUser(null);
    setPage('home');
    setPendingPlan('free');
  };
  const handleChangePlan = (plan) => {
    setUser((u) => {
      const nu = { ...u, tier: plan };
      try { localStorage.setItem('pronosai_session', JSON.stringify(nu)); } catch (e) {}
      return nu;
    });
  };

  return (
    <SafeAreaView style={{ flex: 1, backgroundColor: C.bg }}>
      <StatusBar barStyle="light-content" backgroundColor={C.bg} />
      {/* Popup bienvenue */}
      <Modal visible={showWelcome} transparent animationType="fade">
        <View
          style={{
            flex: 1,
            backgroundColor: '#000000aa',
            alignItems: 'center',
            justifyContent: 'center',
            padding: 24,
          }}>
          <View
            style={{
              backgroundColor: C.card,
              borderRadius: 24,
              borderWidth: 1.5,
              borderColor: '#FBBF2444',
              padding: 24,
              width: '100%',
            }}>
            <Text
              style={{ fontSize: 40, textAlign: 'center', marginBottom: 12 }}>
              🏆
            </Text>
            <Text
              style={{
                fontSize: 22,
                fontWeight: '900',
                color: C.gold,
                textAlign: 'center',
                marginBottom: 8,
              }}>
              Bienvenue sur PronosAI !
            </Text>
            <Text
              style={{
                fontSize: 14,
                color: '#94a3b8',
                textAlign: 'center',
                lineHeight: 22,
                marginBottom: 16,
              }}>
              Pour le lancement, PronosAI se concentre sur la{' '}
              <Text style={{ color: C.gold, fontWeight: '700' }}>
                Coupe du Monde 2026
              </Text>
              .{'\n\n'}
              Analyses de tous les matchs, buteurs probables, scores exacts et
              bien plus encore.{'\n\n'}
              Après la Coupe du Monde, tous les grands championnats seront
              disponibles : Ligue 1, Premier League, Champions League et plus
              encore.
            </Text>
            <TouchableOpacity
              onPress={() => { try { localStorage.setItem('pronosai_welcome_seen', '1'); } catch (e) {} setShowWelcome(false); }}
              activeOpacity={0.85}
              style={{
                backgroundColor: C.gold,
                borderRadius: 14,
                paddingVertical: 14,
                alignItems: 'center',
              }}>
              <Text style={{ fontSize: 15, fontWeight: '800', color: '#000' }}>
                ⚽ C'est parti !
              </Text>
            </TouchableOpacity>
          </View>
        </View>
      </Modal>
      {/* Popup paiement échoué */}
      <Modal visible={showPaymentFailed} transparent animationType="fade">
        <View
          style={{
            flex: 1,
            backgroundColor: '#000000aa',
            alignItems: 'center',
            justifyContent: 'center',
            padding: 24,
          }}>
          <View
            style={{
              backgroundColor: C.card,
              borderRadius: 24,
              borderWidth: 1.5,
              borderColor: '#FBBF2444',
              padding: 24,
              width: '100%',
            }}>
            <Text
              style={{ fontSize: 40, textAlign: 'center', marginBottom: 12 }}>
              🎁
            </Text>
            <Text
              style={{
                fontSize: 20,
                fontWeight: '900',
                color: C.gold,
                textAlign: 'center',
                marginBottom: 8,
              }}>
              Bienvenue sur PronosAI !
            </Text>
            <Text
              style={{
                fontSize: 14,
                color: '#94a3b8',
                textAlign: 'center',
                lineHeight: 22,
                marginBottom: 20,
              }}>
              Ne laissons pas ce problème de paiement gâcher la fête !{'\n\n'}
              Tu as accès au{' '}
              <Text style={{ color: C.gold, fontWeight: '700' }}>
                plan Gratuit
              </Text>{' '}
              avec 3 analyses par jour. Tu pourras upgrader vers Premium ou
              Avancé à tout moment depuis ton Vestiaire.
            </Text>
            <TouchableOpacity
              onPress={() => setShowPaymentFailed(false)}
              activeOpacity={0.85}
              style={{
                backgroundColor: C.gold,
                borderRadius: 14,
                paddingVertical: 14,
                alignItems: 'center',
              }}>
              <Text style={{ fontSize: 15, fontWeight: '800', color: '#000' }}>
                ⚽ C'est parti !
              </Text>
            </TouchableOpacity>
          </View>
        </View>
      </Modal>
      {/* Bannière 18+ tout en haut */}
      <View
        style={{
          backgroundColor: '#0a0a0a',
          paddingVertical: 5,
          paddingHorizontal: 12,
          flexDirection: 'row',
          alignItems: 'center',
          justifyContent: 'space-between',
          borderBottomWidth: 1,
          borderBottomColor: '#1e293b',
        }}>
        <View style={{ flexDirection: 'row', alignItems: 'center', gap: 6 }}>
          <View
            style={{
              backgroundColor: '#dc2626',
              borderRadius: 4,
              paddingHorizontal: 5,
              paddingVertical: 2,
            }}>
            <Text
              style={{
                color: '#fff',
                fontSize: 9,
                fontWeight: '800',
                letterSpacing: 0.5,
              }}>
              18+
            </Text>
          </View>
          <Text style={{ fontSize: 9, color: '#475569' }}>
            Jeu interdit aux mineurs
          </Text>
        </View>
        <View style={{ flexDirection: 'row', alignItems: 'center', gap: 4 }}>
          <Text style={{ fontSize: 9, color: '#475569' }}>Aide : </Text>
          <Text style={{ fontSize: 9, color: '#60a5fa', fontWeight: '700' }}>
            0 974 75 13 13
          </Text>
        </View>
      </View>
      <View style={{ flex: 1, marginBottom: 40 }}>
        {page === 'home' && (
          <HomeScreen
            onChoosePlan={() => setPage('plans')}
            onQuiSommesNous={() => setPage('qui')}
            onNav={navTo}
            cdmMode={cdmMode}
          />
        )}
        {page === 'plans' && (
          <PlansScreen
            onSelect={(p) => {
              setPendingPlan(p);
              setPage('auth');
            }}
          />
        )}
        {page === 'auth' && (
          <AuthScreen
            plan={pendingPlan}
            onSuccess={handleAuth}
            onBack={() => setPage(user ? 'home' : 'plans')}
          />
        )}
        {page === 'analyse' && (
          <AnalyseScreen
            user={user}
            onGoAuth={handleGoAuth}
            cdmMode={cdmMode}
          />
        )}
        {page === 'vestiaire' && user && (
          <VestiairesScreen
            user={user}
            onLogout={handleLogout}
            onChangePlan={handleChangePlan}
          />
        )}
        {page === 'lexique' && <LexiqueScreen onBack={() => setPage('home')} />}
        {page === 'qui' && (
          <QuiSommesNousScreen
            onBack={() => setPage('home')}
            onMentions={() => {
              setPrevPage('qui');
              setPage('mentions');
            }}
            onCGU={() => {
              setPrevPage('qui');
              setPage('cgu');
            }}
          />
        )}
        {page === 'cgu' && (
          <CGUScreen onBack={() => setPage(prevPage || 'home')} />
        )}
        {page === 'mentions' && (
          <MentionsLegalesScreen onBack={() => setPage(prevPage || 'home')} />
        )}
      </View>
      <BottomNav page={page} onNav={navTo} user={user} />
    </SafeAreaView>
  );
}

const __frame = document.createElement('div');
__frame.className = 'app-frame';
document.getElementById('root').appendChild(__frame);
ReactDOM.createRoot(__frame).render(<App />);
const __splash = document.getElementById('splash');
if (__splash) __splash.remove();
</script>
</body>
</html>
